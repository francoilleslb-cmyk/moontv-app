name: 🌙 Moon TV — Build APK

on:
  # Se ejecuta automáticamente con cada push al repo
  push:
    branches: [ main, master ]
  # También se puede ejecutar manualmente desde la web de GitHub
  workflow_dispatch:

jobs:
  build:
    name: Compilar APK
    runs-on: ubuntu-latest

    steps:

      # 1. Descargar el código
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      # 2. Configurar Java 17 (requerido por Android Gradle Plugin 8.x)
      - name: ☕ Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Caché de Gradle para que las próximas compilaciones sean rápidas
      - name: 📦 Caché de Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      # 4. Dar permisos de ejecución a gradlew
      - name: 🔑 Permisos Gradle
        run: chmod +x ./gradlew

      # 5. Compilar el APK debug (no necesita firma)
      - name: 🔨 Compilar APK
        run: ./gradlew assembleDebug --stacktrace

      # 6. Subir el APK como artifact descargable
      - name: 📤 Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: MoonTV-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30   # Se guarda 30 días

      # 7. Mostrar info del APK generado
      - name: ℹ️ Info del APK
        run: |
          echo "✅ APK compilado exitosamente!"
          ls -lh app/build/outputs/apk/debug/app-debug.apk
          echo "📱 Descargalo desde la pestaña Actions → tu workflow → Artifacts"
